function startQuiz(){

question.innerHTML=`

<h2>Choose a Genre</h2>

<button onclick="chooseGenre('romance')">Romance</button>
<button onclick="chooseGenre('thriller')">Thriller</button>
<button onclick="chooseGenre('fantasy')">Fantasy</button>
<button onclick="chooseGenre('feelgood')">Feel Good</button>

`

}

function chooseGenre(g){

genre=g

let buttons=""

subgenres[g].forEach(s=>{
buttons+=`<button onclick="chooseSubgenre('${s}')">${s}</button>`
})

question.innerHTML=`<h2>Choose a Subgenre</h2>${buttons}`

}

function chooseSubgenre(s){

subgenre=s

question.innerHTML=`

<h2>How many episodes?</h2>

<button onclick="chooseEpisodes('short')">8-10</button>
<button onclick="chooseEpisodes('medium')">12-14</button>
<button onclick="chooseEpisodes('long')">16+</button>

`

}

function chooseEpisodes(e){

episodes=e
showResult()

}

function showResult(){

let dramas=recs[genre][subgenre][episodes]

let html="<h2>Your K-Drama Recommendation</h2>"

dramas.forEach(d=>{

html+=`

<div class="dramaCard">

<img class="poster" src="${d.poster}">
<p>${d.title}</p>

</div>

`

})

html+=`<br><button onclick="startQuiz()">Restart Quiz</button>`

question.innerHTML=html

}

startQuiz()
